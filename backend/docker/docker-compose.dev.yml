# ──────────────────────────────────────────────
# MarketMind AI v2 — Docker Compose (Dev)
# ──────────────────────────────────────────────
version: '3.8'

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketmind
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: mmsecret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d marketmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  # ── Celery Worker ──
  celery_worker:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    command: >
      celery -A app.workers.celery_app.celery
      worker
      --loglevel=info
      --concurrency=4

  # ── Celery Beat (Scheduler) ──
  celery_beat:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ..:/app
    command: >
      celery -A app.workers.celery_app.celery
      beat
      --loglevel=info

volumes:
  pgdata:
