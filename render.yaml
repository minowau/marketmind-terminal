services:
  - type: web
    name: marketmind-api
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: PORT
        value: 8000

databases:
  - name: marketmind-db
    plan: free
