services:
  - type: web
    name: marketmind-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5

databases:
  - name: marketmind-db
    plan: free
