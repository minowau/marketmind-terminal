services:
  # ── Backend (FastAPI API) ──
  - type: web
    name: marketmind-api
    env: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: marketmind-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5

  # ── Celery Worker (Background Process) ──
  - type: worker
    name: marketmind-worker
    env: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery worker --loglevel=info -P solo
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: marketmind-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5

  # ── Frontend (Static Site) ──
  - type: static
    name: marketmind-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: marketmind-api
          property: url

databases:
  - name: marketmind-db
    plan: free

redis:
  - name: marketmind-redis
    plan: free
    ipAllowList: [] # Allow all internal connections
