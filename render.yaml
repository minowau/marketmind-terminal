services:
  # ── Consolidated Backend (API + Worker) ──
  - type: web
    name: marketmind-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: honcho start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: marketmind-db
          property: connectionString
      - key: REDIS_URL
        sync: false # User must provide external Redis URL (e.g., Upstash)
      - key: PYTHON_VERSION
        value: 3.11.5

  # ── Frontend (Static Site) ──
  - type: web
    name: marketmind-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: marketmind-backend
          property: url

databases:
  - name: marketmind-db
    plan: free
